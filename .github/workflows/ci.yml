name: CI

# Runs on every PR and every push that isn't `main` / `staging` (those
# branches own their own deploy workflows which already include the CI
# checks). Pure verification — no images are published from here.

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - staging

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: vet · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Resolve modules
        run: go mod tidy

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test -race -timeout 5m ./...

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: mgm-calendar-backend:ci
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,mode=max,scope=backend-ci
