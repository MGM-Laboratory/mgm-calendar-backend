name: Staging

# Fires on every push to the `staging` branch. Runs the same CI gate
# the PR workflow runs, then builds a multi-arch image and pushes it
# to DockerHub with the `staging` tag (plus a sha tag for traceability).

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging
  cancel-in-progress: false

permissions:
  contents: read

env:
  ENVIRONMENT: staging

jobs:
  test:
    name: vet · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - run: go mod tidy
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -timeout 5m ./...

  publish:
    name: Publish to DockerHub (staging)
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Verify DockerHub credentials are configured
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mgm-calendar-backend
          tags: |
            type=raw,value=staging
            type=sha,format=short,prefix=staging-
          labels: |
            org.opencontainers.image.title=mgm-calendar-backend
            org.opencontainers.image.description=MGM Laboratory Event Calendar backend (staging)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging
