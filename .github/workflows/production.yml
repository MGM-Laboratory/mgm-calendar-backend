name: Production

# Fires on every push to `main` and on `v*` tags. Runs the full CI gate,
# then builds a multi-arch image and pushes it to DockerHub with the
# `latest` tag (plus a sha tag, and — when triggered by a `v*` tag — the
# semver tags `1.4.0` and `1.4`).
#
# Releases:
#
#     git checkout main && git pull
#     git tag v0.1.0
#     git push --tags

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

env:
  ENVIRONMENT: production

jobs:
  test:
    name: vet · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - run: go mod tidy
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -timeout 5m ./...

  publish:
    name: Publish to DockerHub (production)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify DockerHub credentials are configured
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mgm-calendar-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=production,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title=mgm-calendar-backend
            org.opencontainers.image.description=MGM Laboratory Event Calendar backend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=backend-production
          cache-to: type=gha,mode=max,scope=backend-production
